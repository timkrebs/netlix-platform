kind: "DatadogAgent"
apiVersion: "datadoghq.com/v2alpha1"
metadata:
  name: "datadog"
  namespace: "datadog"
spec:
  global:
    # Replace CLUSTER_NAME with actual EKS cluster name per environment:
    #   dev:     netlix-dev
    #   staging: netlix-staging
    clusterName: "CLUSTER_NAME"
    site: "datadoghq.eu"
    credentials:
      apiSecret:
        secretName: "datadog-secret"
        keyName: "api-key"
    podLabelsAsTags:
      app: "app"
    podAnnotationsAsTags:
      consul.hashicorp.com/connect-service: consul_service
    tags:
      - cluster:CLUSTER_NAME
      - env:ENVIRONMENT
  features:
    admissionController:
      enabled: true
      mutateUnlabelled: false
    clusterChecks:
      enabled: true
    orchestratorExplorer:
      enabled: true
    apm:
      instrumentation:
        enabled: true
        libVersions:
          java: "1"
          python: "4"
          js: "5"
          dotnet: "3"
          ruby: "2"
          php: "1"
    logCollection:
      enabled: true
      containerCollectAll: true
      containerCollectUsingFiles: true
    eventCollection:
      collectKubernetesEvents: true
    liveProcessCollection:
      enabled: true
      scrubProcessArguments: true
    liveContainerCollection:
      enabled: true
    asm:
      threats:
        enabled: true
    cws:
      enabled: true
    cspm:
      enabled: true
    sbom:
      enabled: true
      containerImage:
        enabled: true
      host:
        enabled: true
    npm:
      enabled: true
      collectDNSStats: true
    usm:
      enabled: true
    prometheusScrape:
      enabled: true
      enableServiceEndpoints: false
    helmCheck:
      enabled: true
      collectEvents: true
    kubeStateMetricsCore:
      enabled: true
