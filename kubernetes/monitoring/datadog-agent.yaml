# Reference manifest — deployed via Terraform component (datadog-operator).
# This file documents the DatadogAgent CRD configuration.
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    clusterName: "netlix-dev"
    site: "datadoghq.eu"
    credentials:
      apiSecret:
        secretName: "datadog-secret"
        keyName: "api-key"
  features:
    clusterChecks:
      enabled: true
    orchestratorExplorer:
      enabled: true
    apm:
      instrumentation:
        enabled: true
        libVersions:
          java: "1"
          python: "4"
          js: "5"
          php: "1"
          dotnet: "3"
          ruby: "2"
    logCollection:
      enabled: true
      containerCollectAll: true
