# ── Datadog namespace ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: datadog
  labels:
    app.kubernetes.io/managed-by: kubectl
---
# ── Datadog API key secret ────────────────────────────────────────────────────
# Never commit the real key. Use one of:
#   kubectl create secret generic datadog-secret -n datadog --from-literal=api-key=<KEY>
#   Vault Secrets Operator (VSO) VaultStaticSecret to sync from Vault KV
apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: datadog
type: Opaque
stringData:
  api-key: "<YOUR_DD_API_KEY>"
---
# ── Label the consul namespace ────────────────────────────────────────────────
# The Datadog Admission Controller needs this label to identify which
# namespaces it should mutate. It injects DD_AGENT_HOST, DD_ENTITY_ID,
# and the UST env vars (DD_ENV / DD_SERVICE / DD_VERSION from
# tags.datadoghq.com/* pod labels) into matching pods automatically.
apiVersion: v1
kind: Namespace
metadata:
  name: consul
  labels:
    admission.datadoghq.com/enabled: "true"
