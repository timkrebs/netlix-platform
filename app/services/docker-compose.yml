# Local integration stack. Mirrors the k8s deployment but uses static
# DB credentials and a static JWT signing key (in production both come
# from Vault via VSO → k8s Secret).
#
#   docker compose -f app/services/docker-compose.yml up --build
#   ./app/services/smoke-test.sh
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netlix
      POSTGRES_PASSWORD: netlix
      POSTGRES_DB: netlix
    ports:
      - "5432:5432"
    volumes:
      - ../manifests/shop/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../manifests/shop/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netlix -d netlix"]
      interval: 2s
      timeout: 2s
      retries: 20

  catalog:
    build: ./catalog
    environment:
      DB_HOST: postgres
      DB_USER: netlix
      DB_PASSWORD: netlix
      DB_NAME: netlix
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8081:8080"

  auth:
    build: ./auth
    environment:
      DB_HOST: postgres
      DB_USER: netlix
      DB_PASSWORD: netlix
      DB_NAME: netlix
      JWT_SIGNING_KEY: local-dev-signing-key-change-in-production
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8082:8080"

  orders:
    build: ./orders
    environment:
      DB_HOST: postgres
      DB_USER: netlix
      DB_PASSWORD: netlix
      DB_NAME: netlix
      JWT_SIGNING_KEY: local-dev-signing-key-change-in-production
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "8083:8080"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      CATALOG_URL: http://catalog:8080
      AUTH_URL: http://auth:8080
      ORDERS_URL: http://orders:8080
    depends_on:
      - catalog
      - auth
      - orders
    ports:
      - "8080:8080"
