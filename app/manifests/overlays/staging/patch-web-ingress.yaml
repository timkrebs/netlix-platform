apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: consul
  annotations:
    # Populate after first staging Stack apply:
    # Command: terraform output -raw -state=terraform.tfstate certificate_arn
    # (from the dns component workspace — this is the ACM wildcard cert ARN)
    alb.ingress.kubernetes.io/certificate-arn: "STAGING_ACM_CERT_ARN_PENDING_FIRST_DEPLOYMENT"
    external-dns.alpha.kubernetes.io/hostname: app.staging.netlix.dev
spec:
  rules:
    - host: app.staging.netlix.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 9090
