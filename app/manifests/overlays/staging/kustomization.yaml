apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../shop

images:
  - name: netlix-catalog
    newName: ghcr.io/timkrebs/netlix-platform/catalog
    newTag: staging-latest
  - name: netlix-auth
    newName: ghcr.io/timkrebs/netlix-platform/auth
    newTag: staging-latest
  - name: netlix-orders
    newName: ghcr.io/timkrebs/netlix-platform/orders
    newTag: staging-latest
  - name: netlix-gateway
    newName: ghcr.io/timkrebs/netlix-platform/gateway
    newTag: staging-latest

patches:
  - path: patch-vault-auth.yaml
    target:
      kind: VaultAuth
      name: default
  # Phase 6.1: per-secret VaultAuth CRDs (added in base/vault-auth-per-secret.yaml).
  - target:
      kind: VaultAuth
      labelSelector: netlix.dev/auth-class=per-secret
    patch: |-
      - op: add
        path: /spec/namespace
        value: staging
  - path: patch-shop-db-namespace.yaml
    target:
      kind: VaultStaticSecret
      name: shop-db
  - path: patch-shop-jwt-namespace.yaml
    target:
      kind: VaultStaticSecret
      name: shop-jwt
  - path: patch-shop-feature-flags-namespace.yaml
    target:
      kind: VaultStaticSecret
      name: shop-feature-flags
  - path: patch-shop-ingress.yaml
    target:
      kind: Ingress
      name: shop
