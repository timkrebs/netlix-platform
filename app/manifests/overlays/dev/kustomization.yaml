apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ../../shop

# Image tags. Each shop service is published from .github/workflows/cd.yaml
# under ghcr.io/timkrebs/netlix-platform/<service>:dev-<sha>. The tag
# below is rewritten by the CD pipeline on every push to dev.
images:
- name: netlix-auth
  newName: ghcr.io/timkrebs/netlix-platform/auth
  newTag: dev-b11e427abad6f0d79aea4a123d71796b1b9039c3
- name: netlix-catalog
  newName: ghcr.io/timkrebs/netlix-platform/catalog
  newTag: dev-b11e427abad6f0d79aea4a123d71796b1b9039c3
- name: netlix-gateway
  newName: ghcr.io/timkrebs/netlix-platform/gateway
  newTag: dev-b11e427abad6f0d79aea4a123d71796b1b9039c3
- name: netlix-orders
  newName: ghcr.io/timkrebs/netlix-platform/orders
  newTag: dev-b11e427abad6f0d79aea4a123d71796b1b9039c3

# Patch the Vault-namespace fields on the shop's VSO resources to point
# at the per-environment Vault namespace (default in base is `admin`).
# Phase 6.1: same treatment for the per-secret VaultAuth CRDs added in
# base/vault-auth-per-secret.yaml. Targeted by label so a single inline
# patch covers all four (vault-auth-shop-{db,jwt,config,pki}).
patches:
- path: patch-vault-auth.yaml
  target:
    kind: VaultAuth
    name: default
- patch: |-
    - op: add
      path: /spec/namespace
      value: dev
  target:
    kind: VaultAuth
    labelSelector: netlix.dev/auth-class=per-secret
- path: patch-shop-db-namespace.yaml
  target:
    kind: VaultStaticSecret
    name: shop-db
- path: patch-shop-jwt-namespace.yaml
  target:
    kind: VaultStaticSecret
    name: shop-jwt
- path: patch-shop-feature-flags-namespace.yaml
  target:
    kind: VaultStaticSecret
    name: shop-feature-flags
- path: patch-pki-namespace.yaml
  target:
    kind: VaultPKISecret
