apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-envoy
  namespace: consul
data:
  envoy.yaml: |
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
    static_resources:
      listeners:
      # Inbound — server TLS only (no client cert required: ALB has none).
      - name: tls_in
        address:
          socket_address: { address: 0.0.0.0, port_value: 8443 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local
                virtual_hosts:
                - name: app
                  domains: ["*"]
                  routes:
                  - match: { prefix: "/" }
                    route: { cluster: app_local, timeout: 30s }
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_certificates:
                - certificate_chain: { filename: /etc/tls/tls.crt }
                  private_key:       { filename: /etc/tls/tls.key }
      # Outbound — gateway app dials http://127.0.0.1:15001/{catalog,auth,orders}/...
      # Envoy strips the prefix and originates mTLS to the upstream service.
      - name: outbound_http
        address:
          socket_address: { address: 127.0.0.1, port_value: 15001 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: egress_http
              codec_type: AUTO
              route_config:
                name: outbound
                virtual_hosts:
                - name: services
                  domains: ["*"]
                  routes:
                  - match: { prefix: "/catalog/" }
                    route: { cluster: catalog_upstream, prefix_rewrite: "/", timeout: 30s }
                  - match: { prefix: "/catalog" }
                    route: { cluster: catalog_upstream, prefix_rewrite: "/", timeout: 30s }
                  - match: { prefix: "/auth/" }
                    route: { cluster: auth_upstream, prefix_rewrite: "/", timeout: 30s }
                  - match: { prefix: "/auth" }
                    route: { cluster: auth_upstream, prefix_rewrite: "/", timeout: 30s }
                  - match: { prefix: "/orders/" }
                    route: { cluster: orders_upstream, prefix_rewrite: "/", timeout: 30s }
                  - match: { prefix: "/orders" }
                    route: { cluster: orders_upstream, prefix_rewrite: "/", timeout: 30s }
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: app_local
        connect_timeout: 1s
        type: STATIC
        load_assignment:
          cluster_name: app_local
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: 127.0.0.1, port_value: 8080 }
      - name: catalog_upstream
        connect_timeout: 2s
        type: STRICT_DNS
        load_assignment:
          cluster_name: catalog_upstream
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: catalog.consul.svc.cluster.local
                    port_value: 8443
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: catalog.consul.svc.cluster.local
            common_tls_context:
              tls_certificates:
              - certificate_chain: { filename: /etc/tls/tls.crt }
                private_key:       { filename: /etc/tls/tls.key }
              validation_context:
                trusted_ca: { filename: /etc/tls/ca.crt }
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher: { exact: catalog.consul.svc.cluster.local }
      - name: auth_upstream
        connect_timeout: 2s
        type: STRICT_DNS
        load_assignment:
          cluster_name: auth_upstream
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: auth.consul.svc.cluster.local
                    port_value: 8443
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: auth.consul.svc.cluster.local
            common_tls_context:
              tls_certificates:
              - certificate_chain: { filename: /etc/tls/tls.crt }
                private_key:       { filename: /etc/tls/tls.key }
              validation_context:
                trusted_ca: { filename: /etc/tls/ca.crt }
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher: { exact: auth.consul.svc.cluster.local }
      - name: orders_upstream
        connect_timeout: 2s
        type: STRICT_DNS
        load_assignment:
          cluster_name: orders_upstream
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: orders.consul.svc.cluster.local
                    port_value: 8443
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: orders.consul.svc.cluster.local
            common_tls_context:
              tls_certificates:
              - certificate_chain: { filename: /etc/tls/tls.crt }
                private_key:       { filename: /etc/tls/tls.key }
              validation_context:
                trusted_ca: { filename: /etc/tls/ca.crt }
                match_typed_subject_alt_names:
                - san_type: DNS
                  matcher: { exact: orders.consul.svc.cluster.local }
