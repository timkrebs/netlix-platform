# Envoy sidecar configs.
# - catalog/auth/orders: inbound mTLS on :8443 → 127.0.0.1:8080. Requires
#   client cert with SAN matching *.consul.svc.cluster.local.
# - gateway: inbound TLS on :8443 (no client cert — ALB has none) PLUS an
#   outbound HTTP listener on 127.0.0.1:15001 that originates mTLS to the
#   three backends. App container dials http://127.0.0.1:15001/{catalog,
#   auth,orders}/... so it doesn't need to trust a custom CA itself.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-envoy
  namespace: consul
data:
  envoy.yaml: |
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }
    static_resources:
      listeners:
      - name: tls_in
        address:
          socket_address: { address: 0.0.0.0, port_value: 8443 }
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local
                virtual_hosts:
                - name: app
                  domains: ["*"]
                  routes:
                  - match: { prefix: "/" }
                    route: { cluster: app_local, timeout: 30s }
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_certificates:
                - certificate_chain: { filename: /etc/tls/tls.crt }
                  private_key:       { filename: /etc/tls/tls.key }
                validation_context:
                  trusted_ca: { filename: /etc/tls/ca.crt }
                  match_typed_subject_alt_names:
                  - san_type: DNS
                    matcher:
                      safe_regex:
                        regex: ".*\\.consul\\.svc\\.cluster\\.local"
      clusters:
      - name: app_local
        connect_timeout: 1s
        type: STATIC
        load_assignment:
          cluster_name: app_local
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: 127.0.0.1, port_value: 8080 }
---
