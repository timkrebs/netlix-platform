# VSO mints a Vault PKI cert per shop service. TTL = 1h, refreshAfter = 40m
# (67% of lifetime). Rolling restart on rotation.
#
# Destination type is Opaque (not kubernetes.io/tls) so we can write a
# separate ca.crt file — Envoy needs the trust store as its own file for
# `validation_context.trusted_ca`. The transformation produces exactly
# the three files the sidecar's envoy.yaml mounts at /etc/tls/.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultPKISecret
metadata:
  name: catalog-tls
  namespace: consul
spec:
  vaultAuthRef: default
  namespace: admin
  mount: pki_int
  role: netlix-app
  commonName: catalog.consul.svc.cluster.local
  altNames:
    - catalog.consul.svc.cluster.local
  ttl: "1h"
  refreshAfter: "40m"
  # Revocation is intentionally off: short-lived (1h) certs are their own
  # revocation strategy, and the netlix-vso policy doesn't grant
  # pki_int/revoke. Re-enable + grant the policy for staging/prod if longer
  # TTLs are used.
  revoke: false
  destination:
    name: catalog-tls
    create: true
    type: Opaque
    transformation:
      excludeRaw: true
      templates:
        tls.crt:
          text: '{{ .Secrets.certificate }}'
        tls.key:
          text: '{{ .Secrets.private_key }}'
        ca.crt:
          text: '{{ .Secrets.issuing_ca }}'
  rolloutRestartTargets:
    - kind: Deployment
      name: catalog
