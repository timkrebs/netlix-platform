apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway
  namespace: consul
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: consul
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: consul
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: gateway-tls
          secret:
            secretName: gateway-tls
            defaultMode: 0400
        - name: gateway-envoy
          configMap:
            name: gateway-envoy
        - name: envoy-tmp
          emptyDir: {}
      initContainers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          restartPolicy: Always
          args: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "gateway"]
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - { name: gateway-tls,   mountPath: /etc/tls,   readOnly: true }
            - { name: gateway-envoy, mountPath: /etc/envoy, readOnly: true }
            - { name: envoy-tmp,     mountPath: /tmp }
          startupProbe:
            httpGet: { path: /ready, port: 9901 }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /ready, port: 9901 }
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      containers:
        - name: gateway
          image: netlix-gateway
          ports:
            - containerPort: 8080
          env:
            # Outbound calls go through the local Envoy on 127.0.0.1:15001;
            # Envoy strips the prefix and originates mTLS to the upstream.
            - name: CATALOG_URL
              value: "http://127.0.0.1:15001/catalog"
            - name: AUTH_URL
              value: "http://127.0.0.1:15001/auth"
            - name: ORDERS_URL
              value: "http://127.0.0.1:15001/orders"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 150m, memory: 128Mi }
            limits:   { cpu: 1500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 30
---
# Public ALB ingress for the shop. ExternalDNS will create the Route53 A record.
# ALB → gateway is plain HTTP on 8080 (gateway is the trust boundary; ALB has
# no client cert). East-west to catalog/auth/orders is mTLS via Envoy.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop
  namespace: consul
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-central-1:173003892479:certificate/72a5bfed-9f0f-4cb5-a661-2a275ee05a6a"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: '200'
    external-dns.alpha.kubernetes.io/hostname: app.dev.netlix.dev
spec:
  ingressClassName: alb
  rules:
    - host: app.dev.netlix.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
