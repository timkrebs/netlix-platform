# Vault Secrets Operator wiring for the web shop.
# Reuses the existing VaultAuth named "default" in the consul namespace
# (defined in app/manifests/base/vault-auth.yaml + patched per-env).
#
# Two k8s Secrets are produced:
#   - shop-db   — Postgres credentials (used by both the in-cluster Postgres
#                 StatefulSet for bootstrap AND by every shop service for
#                 client connections — single source of truth)
#   - shop-jwt  — HMAC signing key for JWTs issued by auth and validated
#                 by orders
#
# Container code never talks to Vault directly. It just reads env vars
# from these k8s Secrets via envFrom.
#
# Vault namespace defaults to `admin` in base; overlays patch to per-env
# (e.g. dev). Both secrets live at `secret/netlix/{db,jwt}` (KV v2).

apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: shop-db
  namespace: consul
spec:
  # Phase 6.1 Commit B: cutover from `default` (wildcard `netlix-vso`
  # role with `secret/data/netlix/*`) to the narrow `vault-auth-shop-db`
  # which can only read `secret/data/netlix/db`.
  vaultAuthRef: vault-auth-shop-db
  namespace: admin
  mount: secret
  type: kv-v2
  path: netlix/db
  refreshAfter: 60s
  destination:
    name: shop-db
    create: true
    transformation:
      excludeRaw: true
      templates:
        DB_USER:
          text: '{{ .Secrets.username }}'
        DB_PASSWORD:
          text: '{{ .Secrets.password }}'
        # Same values surfaced under POSTGRES_* keys so the Postgres
        # StatefulSet can bootstrap from the same Secret.
        POSTGRES_USER:
          text: '{{ .Secrets.username }}'
        POSTGRES_PASSWORD:
          text: '{{ .Secrets.password }}'
  rolloutRestartTargets:
    - kind: Deployment
      name: catalog
    - kind: Deployment
      name: auth
    - kind: Deployment
      name: orders
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: shop-jwt
  namespace: consul
spec:
  # Phase 6.1 Commit B: narrow auth — can only read `secret/data/netlix/jwt`.
  vaultAuthRef: vault-auth-shop-jwt
  namespace: admin
  mount: secret
  type: kv-v2
  path: netlix/jwt
  refreshAfter: 60s
  destination:
    name: shop-jwt
    create: true
    transformation:
      excludeRaw: true
      templates:
        # Phase 6.2: write the entire JWT key set as a single JSON file
        # the auth + orders services hot-reload (no pod restart). The
        # `keys` KVv2 field is itself a JSON-encoded string — VSO
        # writes it verbatim into the K8s Secret's `keys.json` data key.
        keys.json:
          text: '{{ index .Secrets "keys" }}'
  # rolloutRestartTargets intentionally omitted: auth + orders pick up
  # rotated keys via JWKSManager's 30 s file poll. Restarting on every
  # rotation would defeat the zero-downtime goal of Phase 6.2.
