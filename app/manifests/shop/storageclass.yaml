# Encrypted gp3 StorageClass used by the Postgres StatefulSet. Provisioned
# by the EBS CSI driver (already installed on app-cluster). EKS doesn't
# ship an encrypted gp3 SC by default — only `gp2` (unencrypted).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-encrypted
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
allowVolumeExpansion: true
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
