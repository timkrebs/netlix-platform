apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth
  namespace: consul
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: consul
spec:
  selector:
    app: auth
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: consul
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: auth-tls
          secret:
            secretName: auth-tls
            defaultMode: 0400
        - name: auth-envoy
          configMap:
            name: auth-envoy
        - name: envoy-tmp
          emptyDir: {}
        # Phase 6.2: shop-jwt is now mounted as a file rather than env
        # vars so JWKSManager can hot-reload after a Vault key rotation.
        # 0444 (world-readable) — auth runs as nonroot UID 65532.
        # No `subPath`: kubelet refreshes the projected file in place
        # when VSO updates the underlying K8s Secret.
        - name: shop-jwt-keys
          secret:
            secretName: shop-jwt
            defaultMode: 0444
            items:
              - key: keys.json
                path: jwt-keys.json
      initContainers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          restartPolicy: Always
          args: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "auth"]
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - { name: auth-tls,   mountPath: /etc/tls,   readOnly: true }
            - { name: auth-envoy, mountPath: /etc/envoy, readOnly: true }
            - { name: envoy-tmp,  mountPath: /tmp }
          startupProbe:
            httpGet: { path: /ready, port: 9901 }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /ready, port: 9901 }
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      containers:
        - name: auth
          image: netlix-auth
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-db-config
            - secretRef:
                name: shop-db
            # Phase 6.2: shop-jwt is no longer surfaced as env vars —
            # auth reads the multi-key JWKS from /etc/shop/jwt-keys.json
            # via the volume mount below, so a Vault key rotation
            # propagates without a pod restart.
          env:
            - name: JWT_KEYS_PATH
              value: /etc/shop/jwt-keys.json
          volumeMounts:
            - name: shop-jwt-keys
              mountPath: /etc/shop
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 30
