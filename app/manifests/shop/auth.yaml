apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth
  namespace: consul
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: consul
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: consul
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: auth
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth
          image: netlix-auth
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-db-config
            - secretRef:
                name: shop-db
            - secretRef:
                name: shop-jwt
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 30
