apiVersion: v1
kind: ServiceAccount
metadata:
  name: orders
  namespace: consul
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: consul
spec:
  selector:
    app: orders
  ports:
    - name: https
      port: 8443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: consul
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      serviceAccountName: orders
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: orders-tls
          secret:
            secretName: orders-tls
            defaultMode: 0400
        - name: orders-envoy
          configMap:
            name: orders-envoy
        - name: envoy-tmp
          emptyDir: {}
      initContainers:
        - name: envoy
          image: envoyproxy/envoy:v1.31-latest
          restartPolicy: Always
          args: ["-c", "/etc/envoy/envoy.yaml", "--service-cluster", "orders"]
          ports:
            - name: https
              containerPort: 8443
          volumeMounts:
            - { name: orders-tls,   mountPath: /etc/tls,   readOnly: true }
            - { name: orders-envoy, mountPath: /etc/envoy, readOnly: true }
            - { name: envoy-tmp,    mountPath: /tmp }
          startupProbe:
            httpGet: { path: /ready, port: 9901 }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /ready, port: 9901 }
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      containers:
        - name: orders
          image: netlix-orders
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shop-db-config
            - secretRef:
                name: shop-db
            - secretRef:
                name: shop-jwt
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /ready, port: 8080 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            periodSeconds: 30
