apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  namespace: consul
---
# Kubernetes Service — ClusterIP for mesh traffic.
# The web UI is exposed publicly via its own ALB Ingress below.
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: consul
spec:
  selector:
    app: web
  ports:
  - name: http
    port: 9090
    targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: consul
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
      annotations:
        # ── Consul service mesh ──────────────────────────────────────────────
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/connect-service: "web"
        consul.hashicorp.com/connect-service-port: "9090"
        # Upstream: Consul creates an Envoy listener on localhost:8080.
        # The web container calls http://localhost:8080 and Envoy does mTLS
        # to the api service on the other end.
        consul.hashicorp.com/connect-service-upstreams: "api:8080"
        # Exclude app port so kubelet health probes can reach app directly.
        consul.hashicorp.com/transparent-proxy-exclude-inbound-ports: "9090"
        # ── Prometheus scraping via Envoy sidecar ────────────────────────────
        prometheus.io/scrape: "true"
        prometheus.io/port: "20200"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: web
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: web
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        # Custom Go HTTP server — image tag managed by Kustomize overlay.
        # The placeholder name "netlix-web" is replaced by the images transformer.
        image: netlix-web
        env:
        - name: NAME
          value: "web"
        - name: MESSAGE
          value: "Hello from the web frontend"
        - name: UPSTREAM_URIS
          # Envoy upstream listener injected by Consul on localhost:8080
          value: "http://localhost:8080"
        - name: LISTEN_ADDR
          value: "0.0.0.0:9090"
        - name: DD_SERVICE
          value: "web"
        - name: ENVIRONMENT
          value: "dev"
        - name: VERSION
          value: "latest"
        - name: TLS_CERT_PATH
          value: "/vault/secrets/tls.crt"
        - name: TLS_KEY_PATH
          value: "/vault/secrets/tls.key"
        ports:
        - containerPort: 9090
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: vault-tls
          mountPath: /vault/secrets
          readOnly: true
      volumes:
      - name: vault-tls
        secret:
          secretName: web-tls
          optional: true
---
# ALB Ingress for the web frontend — publicly accessible at app.dev.netlix.dev.
# ExternalDNS will create the Route53 A record automatically.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: consul
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:eu-central-1:173003892479:certificate/72a5bfed-9f0f-4cb5-a661-2a275ee05a6a"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # web → Envoy sidecar is plain HTTP (Envoy handles mTLS internally)
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: '200'
    external-dns.alpha.kubernetes.io/hostname: app.dev.netlix.dev
spec:
  ingressClassName: alb
  rules:
  - host: app.dev.netlix.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 9090
