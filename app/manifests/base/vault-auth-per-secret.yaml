# Per-secret-class VaultAuth CRDs (Phase 6.1).
#
# Each VaultAuth references one of the impersonator ServiceAccounts in
# vso-impersonators.yaml and points at the matching narrow Vault role.
# VaultStaticSecret resources opt-in via `spec.vaultAuthRef` — once a
# secret is cut over to its per-service VaultAuth (Phase 6.1 Commit B),
# it can no longer access any path outside its own scope.
#
# The legacy VaultAuth `default` (in vault-auth.yaml) stays in place as
# the fallback — anything still referencing `default` continues to use
# the wildcard `netlix-vso` role until cutover.
#
# The Vault `namespace` field is patched per-environment in
# overlays/{dev,staging}/patch-shop-feature-flags-namespace.yaml-style
# patches added in Phase 6.1 Commit B.

apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth-shop-db
  namespace: consul
  labels:
    netlix.dev/auth-class: per-secret
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: vault-secrets-operator-system/default
  kubernetes:
    role: netlix-shop-db
    serviceAccount: vso-shop-db
    tokenExpirationSeconds: 600
    audiences:
      - vault
      - https://kubernetes.default.svc
---
