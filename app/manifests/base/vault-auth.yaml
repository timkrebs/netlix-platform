apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: default
  namespace: consul
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: vault-secrets-operator-system/default
  kubernetes:
    role: netlix-vso
    serviceAccount: vault-secrets-operator-controller-manager
    tokenExpirationSeconds: 600
    # Two audiences are required:
    #   - "vault": matches the Vault role's audience check on the JWT claim
    #   - "https://kubernetes.default.svc": EKS's API-server default
    #     audience, needed because Vault calls TokenReview without an
    #     explicit audience — K8s then validates against its default.
    audiences:
      - vault
      - https://kubernetes.default.svc
