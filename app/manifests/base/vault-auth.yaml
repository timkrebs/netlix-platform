apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: default
  namespace: consul
spec:
  method: kubernetes
  mount: kubernetes
  vaultConnectionRef: vault-secrets-operator-system/default
  kubernetes:
    role: netlix-vso
    serviceAccount: vault-secrets-operator-controller-manager
    tokenExpirationSeconds: 600
    # Must match audience on the Vault role (vault-config kubernetes
    # auth backend role). Without this, VSO uses the API-server default
    # audience and Vault rejects the JWT as "invalid audience".
    audiences:
      - vault
