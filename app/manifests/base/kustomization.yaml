apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared cluster scaffolding. The actual app (the netlix shop) lives
# under ../shop and is included by each environment overlay.
resources:
  - namespace.yaml
  - resource-quota.yaml
  - vault-sa.yaml
  - vault-auth.yaml
  # Phase 6.1: per-secret-class VSO impersonator SAs and matching
  # VaultAuth CRDs. These exist alongside `vault-sa.yaml` and
  # `vault-auth.yaml` (the legacy single-identity setup) until each
  # VaultStaticSecret is cut over to its per-service VaultAuth in
  # Phase 6.1 Commit B.
  - vso-impersonators.yaml
  - vault-auth-per-secret.yaml
  - network-policies.yaml
