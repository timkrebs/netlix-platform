apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-web-ingress.yaml
    target:
      kind: Ingress
      name: web
  - path: patch-web-env.yaml
    target:
      kind: Deployment
      name: web
  - path: patch-api-env.yaml
    target:
      kind: Deployment
      name: api
