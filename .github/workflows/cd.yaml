name: CD

on:
  push:
    branches: [dev, staging]
    paths: ['app/server/**']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment from branch
        id: env
        run: echo "environment=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag image
        id: meta
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          SHA="${{ github.sha }}"
          TAG="${ENV}-${SHA}"
          URI="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${URI}" >> "$GITHUB_OUTPUT"

          docker build \
            -t "${URI}" \
            -t "${REGISTRY}/${IMAGE_NAME}:${ENV}-latest" \
            app/server/

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.uri }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.uri }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.env.outputs.environment }}-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

      - name: Push to GHCR
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          docker push "${{ steps.meta.outputs.uri }}"
          docker push "${REGISTRY}/${IMAGE_NAME}:${ENV}-latest"

  update-manifests:
    name: Update Kustomize manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update overlay image tag
        run: |
          ENV="${{ needs.build-and-push.outputs.environment }}"
          cd "app/overlays/${ENV}"
          kustomize edit set image "netlix-web=${REGISTRY}/${IMAGE_NAME}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/overlays/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "cd(${{ needs.build-and-push.outputs.environment }}): update image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push

  verify-deployment:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, update-manifests]
    timeout-minutes: 10
    steps:
      - name: Resolve target host
        id: target
        run: |
          ENV="${{ needs.build-and-push.outputs.environment }}"
          echo "host=https://app.${ENV}.netlix.dev" >> "$GITHUB_OUTPUT"

      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting 90s for ArgoCD to detect and sync the manifest change..."
          sleep 90

      - name: Health check
        run: |
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 15 \
              "${{ steps.target.outputs.host }}/health")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "$STATUS" == "200" ]]; then
              echo "Deployment healthy"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Deployment health check failed after 5 attempts"
          exit 1

      - name: Verify response
        run: |
          RESP=$(curl -sf "${{ steps.target.outputs.host }}/")
          echo "$RESP" | jq .
          NAME=$(echo "$RESP" | jq -r '.name')
          ENV=$(echo "$RESP" | jq -r '.environment')
          echo "Deployed: name=${NAME}, environment=${ENV}"
