name: CD

# CD runs exclusively via workflow_call from CI (ci.yaml → cd job)
# or manual workflow_dispatch. Direct push triggers were removed so
# deployments can't race ahead of the CI gate (terraform fmt/validate,
# go test, kubeconform, image scan, sentinel). Retrigger loops from
# this workflow's own bot commit are avoided two ways: (1) the commit
# message includes [skip ci] which GitHub honors cluster-wide, and
# (2) workflow_call no longer matches the manifest-path filter since
# there is no path filter to match.
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually triggering CD? (for audit log)"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The gateway image bundles the SPA, so its build context is the
        # whole `app/services` directory. The other services build from
        # their own subdirectory.
        include:
          - service: catalog
            context: app/services/catalog
            dockerfile: Dockerfile
          - service: auth
            context: app/services/auth
            dockerfile: Dockerfile
          - service: orders
            context: app/services/orders
            dockerfile: Dockerfile
          - service: gateway
            context: app/services
            dockerfile: gateway/Dockerfile
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment from branch
        id: env
        run: echo "environment=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image refs
        id: meta
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          SHA="${{ github.sha }}"
          TAG="${ENV}-${SHA}"
          IMAGE="${REGISTRY}/${{ github.repository }}/${{ matrix.service }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "uri_latest=${IMAGE}:${ENV}-latest" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -f "${{ matrix.context }}/${{ matrix.dockerfile }}" \
            -t "${{ steps.meta.outputs.uri }}" \
            -t "${{ steps.meta.outputs.uri_latest }}" \
            "${{ matrix.context }}"

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.uri }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.uri }}
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ steps.env.outputs.environment }}-${{ github.sha }}
          path: sbom-${{ matrix.service }}.spdx.json
          retention-days: 90

      - name: Push to GHCR
        run: |
          docker push "${{ steps.meta.outputs.uri }}"
          docker push "${{ steps.meta.outputs.uri_latest }}"

  update-manifests:
    name: Update Kustomize manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Pin all four shop images to this SHA
        run: |
          ENV="${{ needs.build-and-push.outputs.environment }}"
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          REPO="${REGISTRY}/${{ github.repository }}"
          cd "app/manifests/overlays/${ENV}"
          for svc in catalog auth orders gateway; do
            kustomize edit set image "netlix-${svc}=${REPO}/${svc}:${TAG}"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/manifests/overlays/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          # [skip ci] prevents the bot commit from retriggering this
          # workflow via CI — CD is already complete for this SHA, and
          # ArgoCD picks up the manifest bump directly from the repo.
          git commit -m "cd(${{ needs.build-and-push.outputs.environment }}): bump shop images to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push

  verify-deployment:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, update-manifests]
    timeout-minutes: 10
    steps:
      - name: Resolve target host
        id: target
        run: |
          ENV="${{ needs.build-and-push.outputs.environment }}"
          echo "host=https://app.${ENV}.netlix.dev" >> "$GITHUB_OUTPUT"

      - name: Wait for ArgoCD sync
        run: |
          echo "Waiting 90s for ArgoCD to detect and sync the manifest change..."
          sleep 90

      - name: Health check (gateway)
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 15 \
              "${{ steps.target.outputs.host }}/health")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "$STATUS" == "200" ]]; then
              echo "Gateway healthy"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Gateway health check failed after 10 attempts"
          exit 1

      - name: Smoke test products endpoint
        run: |
          curl -fsS "${{ steps.target.outputs.host }}/api/catalog/products" \
            | head -c 500
