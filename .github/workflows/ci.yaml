name: CI

on:
  pull_request:
    paths: ['app/**']
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: app/go.sum

      - name: Build
        working-directory: app
        run: go build -v ./...

      - name: Test
        working-directory: app
        run: go test -v -race ./...

      - name: Vet
        working-directory: app
        run: go vet ./...
