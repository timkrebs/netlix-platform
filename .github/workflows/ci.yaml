name: CI

on:
  pull_request:
    branches: [dev, staging, main]
    paths: ['terraform/**', 'bootstrap/**', '.github/workflows/**', 'sentinel/**', 'app/**']
  push:
    branches: [dev, staging, main]
    paths: ['terraform/**', 'bootstrap/**', '.github/workflows/**', 'sentinel/**', 'app/**']

jobs:
  terraform-fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.8'

      - name: Format check (components)
        run: terraform fmt -check -recursive terraform/components/

      - name: Format check (workspaces)
        run: terraform fmt -check -recursive terraform/workspaces/

      - name: Format check (bootstrap)
        run: terraform fmt -check -recursive bootstrap/

  sentinel-test:
    name: Sentinel policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sentinel
        run: |
          SENTINEL_VERSION="0.26.3"
          curl -fsSL "https://releases.hashicorp.com/sentinel/${SENTINEL_VERSION}/sentinel_${SENTINEL_VERSION}_linux_amd64.zip" -o sentinel.zip
          unzip sentinel.zip -d /usr/local/bin
          sentinel version

      - name: Run Sentinel tests
        working-directory: sentinel
        run: sentinel test -verbose ./policies/

  validate-components:
    name: Validate ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - networking
          - dns
          - eks
          - rds
          - cert-manager
          - vault-server
          - vault-config
          - vso
          - alb-controller
          - external-dns
          - argocd
          - monitoring
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.8'

      - name: Init
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform validate

  validate-workspaces:
    name: Validate workspace ${{ matrix.workspace }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace:
          - network
          - vault-cluster
          - app-cluster
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.8'

      - name: Init
        working-directory: terraform/workspaces/${{ matrix.workspace }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform/workspaces/${{ matrix.workspace }}
        run: terraform validate

  terraform-test:
    name: Test ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - networking
          - dns
          - eks
          - rds
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.8'

      - name: Init
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform init -backend=false

      - name: Test
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform test -verbose

  go-test:
    name: Go test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        working-directory: app/server
        run: go vet ./...

      - name: Test with coverage
        working-directory: app/server
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Display coverage
        working-directory: app/server
        run: go tool cover -func=coverage.out

      - name: Build
        working-directory: app/server
        run: go build -o /dev/null .

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: app/server/coverage.out
          retention-days: 14

  validate-manifests:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        overlay: [dev, staging]
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Render and validate ${{ matrix.overlay }} overlay
        run: |
          kubectl kustomize --load-restrictor LoadRestrictionsNone app/overlays/${{ matrix.overlay }}/ \
            | kubeconform \
                -strict \
                -summary \
                -output text \
                -kubernetes-version 1.31.0 \
                -skip VaultAuth,VaultPKISecret

  image-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t netlix-web:ci app/server/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: netlix-web:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
