name: CI

on:
  pull_request:
    paths: ['terraform/**', '*.tfcomponent.hcl', '*.tfdeploy.hcl']
  push:
    branches: [main]
    paths: ['terraform/**', '*.tfcomponent.hcl', '*.tfdeploy.hcl']

jobs:
  terraform-fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.5'

      - name: Format check (components)
        run: terraform fmt -check -recursive terraform/components/

      - name: Format check (bootstrap)
        run: terraform fmt -check -recursive bootstrap/

  validate-components:
    name: Validate ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - networking
          - dns
          - eks
          - rds
          - hvn-peering
          - vault-config
          - vso
          - argocd
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.5'

      - name: Init
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform validate
