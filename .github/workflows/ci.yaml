name: CI

on:
  pull_request:
    branches: [dev, staging, main]
    paths: ['terraform/**', '*.tfcomponent.hcl', '*.tfdeploy.hcl', 'sentinel/**', 'app/server/**']
  push:
    branches: [dev, staging, main]
    paths: ['terraform/**', '*.tfcomponent.hcl', '*.tfdeploy.hcl', 'sentinel/**', 'app/server/**']

jobs:
  terraform-fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.5'

      - name: Format check (components)
        run: terraform fmt -check -recursive terraform/components/

      - name: Format check (bootstrap)
        run: terraform fmt -check -recursive bootstrap/

  sentinel-test:
    name: Sentinel policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sentinel
        run: |
          SENTINEL_VERSION="0.26.3"
          curl -fsSL "https://releases.hashicorp.com/sentinel/${SENTINEL_VERSION}/sentinel_${SENTINEL_VERSION}_linux_amd64.zip" -o sentinel.zip
          unzip sentinel.zip -d /usr/local/bin
          sentinel version

      - name: Run Sentinel tests
        working-directory: sentinel
        run: sentinel test -verbose ./policies/

  validate-components:
    name: Validate ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - networking
          - dns
          - eks
          - rds
          - hvn-peering
          - vault-config
          - vso
          - alb-controller
          - external-dns
          - argocd
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.5'

      - name: Init
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: terraform/components/${{ matrix.component }}
        run: terraform validate

  go-build:
    name: Go build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        working-directory: app/server
        run: go vet ./...

      - name: Build
        working-directory: app/server
        run: go build -o /dev/null .

  image-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t netlix-web:ci app/server/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: netlix-web:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
