name: Load Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
      users:
        description: 'Number of concurrent users'
        required: true
        default: '200'
        type: string
      spawn_rate:
        description: 'Users spawned per second'
        required: true
        default: '10'
        type: string
      duration:
        description: 'Test duration (e.g. 5m, 10m)'
        required: true
        default: '5m'
        type: string
      max_fail_ratio:
        description: 'Max acceptable failure ratio (0.05 = 5%)'
        required: false
        default: '0.05'
        type: string
      max_p95_ms:
        description: 'Max acceptable p95 latency (ms)'
        required: false
        default: '2000'
        type: string

permissions:
  contents: read

jobs:
  load-test:
    name: 'Load test (${{ inputs.environment }})'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LOCUST_MAX_FAIL_RATIO: ${{ inputs.max_fail_ratio }}
      LOCUST_MAX_P95_MS: ${{ inputs.max_p95_ms }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Locust
        run: pip install locust==2.32.4

      - name: Resolve target host
        id: target
        run: |
          ENV="${{ inputs.environment }}"
          if [[ "$ENV" == "dev" ]]; then
            HOST="https://app.dev.netlix.dev"
          elif [[ "$ENV" == "staging" ]]; then
            HOST="https://app.staging.netlix.dev"
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "Target: ${HOST}"

      - name: Verify target is reachable
        run: |
          echo "Checking ${{ steps.target.outputs.host }}/health ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 15 \
            "${{ steps.target.outputs.host }}/health")
          echo "Health check status: ${STATUS}"
          if [[ "$STATUS" != "200" ]]; then
            echo "ERROR: Target is not reachable (HTTP ${STATUS})"
            echo "Make sure the ${{ inputs.environment }} environment is deployed and DNS is resolving."
            exit 1
          fi

      # ── Run the load test ─────────────────────────────────────────
      - name: Run Locust load test
        working-directory: load-testing
        run: |
          mkdir -p results

          echo "============================================================"
          echo "LOAD TEST CONFIGURATION"
          echo "============================================================"
          echo "  Target       : ${{ steps.target.outputs.host }}"
          echo "  Users        : ${{ inputs.users }}"
          echo "  Spawn rate   : ${{ inputs.spawn_rate }}/sec"
          echo "  Duration     : ${{ inputs.duration }}"
          echo "  Max fail %   : ${{ inputs.max_fail_ratio }}"
          echo "  Max p95 ms   : ${{ inputs.max_p95_ms }}"
          echo "============================================================"
          echo ""

          locust \
            --locustfile locustfile.py \
            --host "${{ steps.target.outputs.host }}" \
            --headless \
            --users "${{ inputs.users }}" \
            --spawn-rate "${{ inputs.spawn_rate }}" \
            --run-time "${{ inputs.duration }}" \
            --csv results/load-test \
            --html results/load-test-report.html \
            --loglevel INFO \
            --exit-code-on-error 1 \
            2>&1 | tee results/locust.log

          echo ""
          echo "Locust exit code: ${PIPESTATUS[0]}"

      # ── Validate results ──────────────────────────────────────────
      - name: Validate results against thresholds
        if: always()
        env:
          MAX_FAIL_RATIO: ${{ inputs.max_fail_ratio }}
          MAX_P95_MS: ${{ inputs.max_p95_ms }}
        run: |
          if [[ -f load-testing/results/load-test_stats.csv ]]; then
            bash load-testing/check-results.sh load-testing/results/load-test
          else
            echo "ERROR: No results CSV found — Locust may not have completed"
            echo ""
            echo "Last 30 lines of Locust log:"
            tail -30 load-testing/results/locust.log 2>/dev/null || echo "(no log)"
            exit 1
          fi

      - name: Generate summary
        if: always()
        run: |
          if [[ -f load-testing/results/load-test_stats.csv ]]; then
            echo "## Load Test Results — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Target | \`${{ steps.target.outputs.host }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Users | ${{ inputs.users }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Duration | ${{ inputs.duration }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Parse aggregated row
            AGG=$(grep '"Aggregated"' load-testing/results/load-test_stats.csv || true)
            if [[ -n "$AGG" ]]; then
              REQS=$(echo "$AGG" | awk -F',' '{print $3}')
              FAILS=$(echo "$AGG" | awk -F',' '{print $4}')
              AVG=$(echo "$AGG" | awk -F',' '{print $6}')
              P95=$(echo "$AGG" | awk -F',' '{print $17}')
              RPS=$(echo "$AGG" | awk -F',' '{print $10}')

              echo "| Metric | Value | Threshold |" >> "$GITHUB_STEP_SUMMARY"
              echo "|--------|-------|-----------|" >> "$GITHUB_STEP_SUMMARY"
              echo "| Total requests | ${REQS} | — |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Failures | ${FAILS} | <${{ inputs.max_fail_ratio }} ratio |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Avg latency | ${AVG} ms | — |" >> "$GITHUB_STEP_SUMMARY"
              echo "| p95 latency | ${P95} ms | <${{ inputs.max_p95_ms }} ms |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Requests/sec | ${RPS} | — |" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      # ── Upload artifacts ──────────────────────────────────────────
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ inputs.environment }}-${{ github.run_number }}
          path: load-testing/results/
          retention-days: 30
