name: Promote

on:
  workflow_dispatch:
    inputs:
      from:
        description: 'Source branch'
        required: true
        type: choice
        options:
          - dev
          - staging
      to:
        description: 'Target branch'
        required: true
        type: choice
        options:
          - staging
          - main

permissions:
  contents: read
  pull-requests: write
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      pr_url: ${{ steps.pr.outputs.url }}
    steps:
      - name: Validate promotion path
        run: |
          FROM="${{ inputs.from }}"
          TO="${{ inputs.to }}"

          if [[ "$FROM" == "dev" && "$TO" == "staging" ]]; then
            echo "Valid promotion: dev → staging"
          elif [[ "$FROM" == "staging" && "$TO" == "main" ]]; then
            echo "Valid promotion: staging → main"
          else
            echo "::error::Invalid promotion path: ${FROM} → ${TO}. Allowed: dev→staging, staging→main"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.from }}
          fetch-depth: 0

      - name: Generate commit summary
        id: summary
        run: |
          COMMITS=$(git log origin/${{ inputs.to }}..origin/${{ inputs.from }} --oneline --no-merges | head -30)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commits<<${EOF}" >> "$GITHUB_OUTPUT"
          echo "${COMMITS}" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

          COUNT=$(git log origin/${{ inputs.to }}..origin/${{ inputs.from }} --oneline --no-merges | wc -l | tr -d ' ')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create promotion PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base "${{ inputs.to }}" \
            --head "${{ inputs.from }}" \
            --title "promote(${{ inputs.from }} → ${{ inputs.to }}): ${{ steps.summary.outputs.count }} commits" \
            --body "$(cat <<'PREOF'
          ## Promotion: ${{ inputs.from }} → ${{ inputs.to }}

          **${{ steps.summary.outputs.count }}** commits to promote:

          ```
          ${{ steps.summary.outputs.commits }}
          ```

          ### Pre-merge Gates
          - [ ] CI passes on source branch
          - [ ] **Load test passed** (auto-triggered by this workflow)
          - [ ] No known regressions

          ---
          Triggered by @${{ github.actor }} via workflow dispatch.
          PREOF
          )")

          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Created PR: ${PR_URL}"

  load-test:
    name: 'Load test gate (${{ inputs.from }})'
    needs: promote
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LOCUST_MAX_FAIL_RATIO: '0.05'
      LOCUST_MAX_P95_MS: '2000'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.from }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Locust
        run: pip install locust==2.32.4

      - name: Resolve target host
        id: target
        run: |
          ENV="${{ inputs.from }}"
          if [[ "$ENV" == "dev" ]]; then
            HOST="https://app.dev.netlix.dev"
          elif [[ "$ENV" == "staging" ]]; then
            HOST="https://app.staging.netlix.dev"
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "Target: ${HOST}"

      - name: Verify target is reachable
        run: |
          echo "Checking ${{ steps.target.outputs.host }}/health ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 --max-time 15 \
            "${{ steps.target.outputs.host }}/health")
          echo "Health check status: ${STATUS}"
          if [[ "$STATUS" != "200" ]]; then
            echo "ERROR: Target is not reachable (HTTP ${STATUS})"
            exit 1
          fi

      - name: Run load test
        working-directory: load-testing
        run: |
          mkdir -p results

          echo "============================================================"
          echo "PROMOTION LOAD TEST — ${{ inputs.from }} → ${{ inputs.to }}"
          echo "Target: ${{ steps.target.outputs.host }}"
          echo "============================================================"

          locust \
            --locustfile locustfile.py \
            --host "${{ steps.target.outputs.host }}" \
            --headless \
            --users 200 \
            --spawn-rate 10 \
            --run-time 5m \
            --csv results/load-test \
            --html results/load-test-report.html \
            --loglevel INFO \
            --exit-code-on-error 1 \
            2>&1 | tee results/locust.log

      - name: Validate results
        if: always()
        env:
          MAX_FAIL_RATIO: '0.05'
          MAX_P95_MS: '2000'
        run: |
          if [[ -f load-testing/results/load-test_stats.csv ]]; then
            bash load-testing/check-results.sh load-testing/results/load-test
          else
            echo "ERROR: No results CSV found"
            tail -30 load-testing/results/locust.log 2>/dev/null || true
            exit 1
          fi

      - name: Comment results on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT="PASSED"
          EMOJI="white_check_mark"
          if [[ "${{ job.status }}" != "success" ]]; then
            RESULT="FAILED"
            EMOJI="x"
          fi

          # Parse stats if available
          BODY=":${EMOJI}: **Load Test ${RESULT}** — ${{ inputs.from }} → ${{ inputs.to }}"
          BODY="${BODY}\n\n| Metric | Value |"
          BODY="${BODY}\n|--------|-------|"

          if [[ -f load-testing/results/load-test_stats.csv ]]; then
            AGG=$(grep -i 'Aggregated' load-testing/results/load-test_stats.csv | grep -v '^Type' | tr -d '"' || true)
            if [[ -n "$AGG" ]]; then
              REQS=$(echo "$AGG" | awk -F',' '{print $3}')
              FAILS=$(echo "$AGG" | awk -F',' '{print $4}')
              AVG=$(echo "$AGG" | awk -F',' '{printf "%.0f", $6}')
              P95=$(echo "$AGG" | awk -F',' '{printf "%.0f", $17}')
              RPS=$(echo "$AGG" | awk -F',' '{printf "%.1f", $10}')

              BODY="${BODY}\n| Total requests | ${REQS} |"
              BODY="${BODY}\n| Failures | ${FAILS} |"
              BODY="${BODY}\n| Avg latency | ${AVG} ms |"
              BODY="${BODY}\n| p95 latency | ${P95} ms |"
              BODY="${BODY}\n| Requests/sec | ${RPS} |"
            fi
          fi

          BODY="${BODY}\n\n[View full results](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          echo -e "$BODY" | gh pr comment "${{ needs.promote.outputs.pr_number }}" --body-file -

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promotion-load-test-${{ inputs.from }}-${{ github.run_number }}
          path: load-testing/results/
          retention-days: 30
